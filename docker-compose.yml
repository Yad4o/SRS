# =============================================================================
# SRS (Support Request System) - Docker Compose Configuration
# =============================================================================
# Production-ready multi-service deployment with monitoring and scaling

version: '3.9'

networks:
  srs-network:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local
  app_logs:
    driver: local

services:
  # -----------------------------------------------------------------------------
  # PostgreSQL Database
  # -----------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: srs-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-srs_db}
      POSTGRES_USER: ${POSTGRES_USER:-srs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-srs_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      - ./scripts/postgres-backup.sh:/scripts/backup.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - srs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-srs_user} -d ${POSTGRES_DB:-srs_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------------------------
  # Redis Cache & Session Store
  # -----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: srs-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - ./scripts/redis-backup.sh:/scripts/backup.sh:ro
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - srs-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------------------------
  # SRS Backend API (Primary)
  # -----------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        BUILD_ENV: production
        APP_VERSION: ${APP_VERSION:-1.0.0}
    container_name: srs-api
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-srs_user}:${POSTGRES_PASSWORD:-srs_password}@db:5432/${POSTGRES_DB:-srs_db}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-srs_db}
      DB_USER: ${POSTGRES_USER:-srs_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-srs_password}
      
      # Redis
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Application
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      DEBUG: false
      LOG_LEVEL: INFO
      
      # AI Services
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_PROVIDER: openai
      
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@yourdomain.com}
      
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN}
      PROMETHEUS_ENABLED: true
      
      # Performance
      WORKERS: ${API_WORKERS:-4}
      MAX_CONNECTIONS: ${MAX_CONNECTIONS:-20}
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - srs-network
      - monitoring
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
      - ./uploads:/app/uploads:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # -----------------------------------------------------------------------------
  # Celery Worker (Background Tasks)
  # -----------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: srs-worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      # Inherit from API service
      DATABASE_URL: postgresql://${POSTGRES_USER:-srs_user}:${POSTGRES_PASSWORD:-srs_password}@db:5432/${POSTGRES_DB:-srs_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    networks:
      - srs-network
    depends_on:
      - db
      - redis
    volumes:
      - app_logs:/app/logs
      - ./uploads:/app/uploads:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------------------------
  # Celery Beat (Scheduled Tasks)
  # -----------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: srs-beat
    command: celery -A workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-srs_user}:${POSTGRES_PASSWORD:-srs_password}@db:5432/${POSTGRES_DB:-srs_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    networks:
      - srs-network
    depends_on:
      - db
      - redis
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------------------------
  # Nginx Reverse Proxy & Load Balancer
  # -----------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: srs-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - srs-network
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------------------------
  # Prometheus Monitoring
  # -----------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: srs-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------------------------
  # Grafana Dashboard
  # -----------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: srs-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------------------------
  # Redis Commander (Redis Management UI)
  # -----------------------------------------------------------------------------
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: srs-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    networks:
      - srs-network
    depends_on:
      - redis
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# -----------------------------------------------------------------------------
# Development Override
# -----------------------------------------------------------------------------
# Use: docker-compose -f docker-compose.yml -f docker-compose.override.yml up
# -----------------------------------------------------------------------------
# This section allows for development-specific overrides
