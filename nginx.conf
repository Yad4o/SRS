# =============================================================================
# nginx.conf — Reverse proxy + TLS termination for SRS
# =============================================================================
# Terminates TLS and proxies all traffic to the FastAPI `api` service
# (see docker-compose.yml). Mounted read-only into the nginx container at
# /etc/nginx/nginx.conf.
#
# Certificates are expected at:
#   /etc/nginx/ssl/fullchain.pem
#   /etc/nginx/ssl/privkey.pem
#
# Local dev:    ./scripts/generate-dev-cert.sh   (self-signed)
# Production:   Let's Encrypt / Certbot, or your provider's managed cert
#
# Full setup instructions: docs/deployment/NGINX.md
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Don't leak the nginx version in error pages / headers.
    server_tokens off;

    # ---------------------------------------------------------------------
    # Rate limiting at the proxy layer (defence in depth — the app already
    # rate-limits via SlowAPI, this catches abuse before it reaches uvicorn)
    # ---------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=srs_general:10m rate=30r/s;

    # ---------------------------------------------------------------------
    # HTTP — redirect everything to HTTPS, except the ACME HTTP-01
    # challenge path used by Certbot for certificate issuance/renewal.
    # ---------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------
    # HTTPS — TLS termination + reverse proxy to the FastAPI app
    # ---------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern TLS only — disables the long-deprecated TLSv1/1.1.
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers (defence in depth on top of app-level handling).
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        limit_req zone=srs_general burst=50 nodelay;

        location / {
            proxy_pass http://api:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # Let the load balancer / orchestrator hit this without TLS noise
        # in app logs if it ever calls nginx directly instead of the api
        # container's own healthcheck.
        location /health {
            proxy_pass http://api:8000/health;
            access_log off;
        }
    }
}
