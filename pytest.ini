[pytest]
# =============================================================================
# SRS (Support Request System) Pytest Configuration
# =============================================================================

# Test discovery and execution
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output and reporting configuration
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --color=yes
    --durations=10
    --cov=app
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    --maxfail=5
    --reuse-db

# Comprehensive test markers for categorization
markers =
    # Test type markers
    unit: Unit tests for individual components (no external dependencies)
    integration: Integration tests for multiple components
    api: API endpoint tests
    ai: AI service tests (OpenAI, classification, etc.)
    
    # Test characteristic markers
    mock: Tests using mocked services
    edge: Edge case and boundary condition tests
    performance: Performance and reliability tests
    slow: Tests that take longer to run (>30s)
    
    # Infrastructure dependency markers
    database: Tests requiring database interaction
    redis: Tests requiring Redis
    external: Tests requiring external services (API calls, etc.)
    docker: Tests requiring Docker containers
    
    # Environment markers
    smoke: Basic smoke tests for critical functionality
    regression: Regression tests for known issues
    security: Security-focused tests
    
    # Feature-specific markers
    auth: Authentication and authorization tests
    tickets: Ticket management tests
    users: User management tests
    classification: AI classification tests
    notifications: Notification system tests

# Minimum pytest version requirement
minversion = 6.0

# Parallel execution configuration (requires pytest-xdist)
# addopts = -n auto --dist loadscope

# Timeout configuration (requires pytest-timeout)
timeout = 300
timeout_method = thread

# Logging configuration for test execution
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s (%(filename)s:%(lineno)d)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File logging during tests
log_file = tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s (%(filename)s:%(lineno)d)
log_file_date_format = %Y-%m-%d %H:%M:%S

# Warning filtering
filterwarnings =
    # Ignore common deprecation warnings from dependencies
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    
    # SQLAlchemy warnings
    ignore::UserWarning:sqlalchemy.*
    ignore::DeprecationWarning:sqlalchemy.*
    
    # HTTPx warnings
    ignore::DeprecationWarning:httpx
    
    # Pydantic warnings
    ignore::UserWarning:pydantic.*
    
    # OpenAI warnings
    ignore::UserWarning:openai.*
    
    # Test-specific warnings
    ignore::pytest.PytestUnraisableExceptionWarning

# Test session configuration
console_output_style = progress
show_capture = no
showlocals = false

# JUnit XML reporting for CI/CD integration
junit_family = xunit2
junit_logging = all

# Coverage configuration (moved to pyproject.toml but kept for compatibility)
# This section is now primarily handled by [tool.coverage] in pyproject.toml

# Custom configuration for specific test environments
[pytest:env]
TESTING = true
DATABASE_URL = sqlite:///./test_srs.db
REDIS_URL = redis://localhost:6379/1
OPENAI_API_KEY = test-key
SECRET_KEY = test-secret-key-for-testing-only

# Environment-specific overrides
[pytest:ci]
addopts = 
    --maxfail=1
    --tb=long
    --cov-report=xml
    --junit-xml=junit.xml

[pytest:local]
addopts = 
    --cov-fail-under=85
    --lf
