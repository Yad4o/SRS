name: Docker Cleanup

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [staging, production]
    
    steps:
      - name: Cleanup Docker resources
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets[format('{0}_HOST', matrix.environment)] }}
          username: ${{ secrets[format('{0}_USER', matrix.environment)] }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/srs-${{ matrix.environment }}
            
            echo "=== Docker System Cleanup ==="
            docker system prune -af --volumes
            
            echo "=== Remove unused images older than 7 days ==="
            docker image prune -af --filter "until=168h"
            
            echo "=== Remove unused containers older than 24 hours ==="
            docker container prune -af --filter "until=24h"
            
            echo "=== Current Docker Usage ==="
            docker system df
            
            echo "=== Active Containers ==="
            docker ps -a
