name: Deploy to Staging

on:
  push:
    branches: [ develop ]
    paths: 
      - 'app/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

env:
  ENVIRONMENT: staging
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/srs-backend:staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ENVIRONMENT=staging

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/srs-staging
            
            # Backup current deployment
            docker-compose down
            docker tag ${{ env.DOCKER_IMAGE }} ${{ env.DOCKER_IMAGE }}-backup-$(date +%Y%m%d-%H%M%S) || true
            
            # Pull and deploy new version
            docker-compose pull
            docker-compose up -d
            
            # Wait for health check
            sleep 30
            docker-compose exec -T app curl -f http://localhost:8000/health || exit 1
            
            # Cleanup
            docker system prune -f

      - name: Run smoke tests
        run: |
          sleep 60
          curl -f ${{ secrets.STAGING_URL }}/health || exit 1
          curl -f ${{ secrets.STAGING_URL }}/api/v1/status || exit 1

      - name: Notify Slack
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          text: 'Staging deployment successful! ${{ env.STAGING_URL }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify Slack on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#deployments'
          text: 'Staging deployment failed!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
